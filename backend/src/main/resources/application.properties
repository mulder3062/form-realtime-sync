spring.application.name=form-sync
# Render 등 PaaS는 PORT 환경변수를 주입한다. 미설정 시 8080.
server.port=${PORT:8080}

# 허용 오리진. 배포 시 CORS_ALLOWED_ORIGINS로 프론트엔드 주소를 주입한다(쉼표 구분).
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# 알 수 없는 JSON 필드(빈 payload 등)는 무시
spring.jackson.deserialization.fail-on-unknown-properties=false
